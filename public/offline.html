<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline</title>
    <meta name="theme-color" content="#ef4444" />
    <style>
      :root {
        color-scheme: light;
        background: #f8fafc;
        color: #0f172a;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, #fef2f2 0%, #f8fafc 55%, #e2e8f0 100%);
        padding: 20px;
      }
      .card {
        width: min(100%, 560px);
        background: #ffffff;
        border: 1px solid rgba(15, 23, 42, 0.08);
        border-radius: 28px;
        box-shadow: 0 24px 80px rgba(15, 23, 42, 0.12);
        padding: 36px;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.55rem 0.9rem;
        border-radius: 999px;
        background: #fee2e2;
        color: #b91c1c;
        font-size: 0.95rem;
        font-weight: 700;
        margin-bottom: 20px;
      }
      h1 {
        margin: 0 0 16px;
        font-size: clamp(2rem, 2.3vw, 2.75rem);
        letter-spacing: -0.03em;
      }
      p {
        margin: 0;
        color: #475569;
        line-height: 1.85;
        font-size: 1rem;
      }
      .actions {
        margin-top: 28px;
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }
      .button {
        display: inline-flex;
        justify-content: center;
        align-items: center;
        min-width: 170px;
        padding: 14px 22px;
        border-radius: 9999px;
        border: none;
        background: #ef4444;
        color: #ffffff;
        text-decoration: none;
        font-weight: 700;
        transition: transform 0.2s ease, background-color 0.2s ease;
      }
      .button:hover {
        background: #dc2626;
        transform: translateY(-1px);
      }
      .secondary {
        background: #f8fafc;
        color: #0f172a;
        border: 1px solid rgba(15, 23, 42, 0.12);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge">Offline mode</div>
      <h1>Ups, koneksi terputus</h1>
      <p>
        Aplikasi tidak dapat memuat halaman karena jaringan internet Anda sedang tidak aktif.
        Halaman awal akan muncul otomatis jika sudah pernah dibuka dan di-cache.
      </p>
      <div class="actions">
        <a href="/" class="button">Kembali ke Home</a>
        <a href="javascript:location.reload();" class="button secondary">Coba lagi</a>
      </div>
    </div>
  </body>
</html>
