version: '3.9'

services:
  db:
    image: mysql:8.0
    container_name: db
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ekspedisi

    ports:
      - '3306:3306'

    volumes:
      - db_data:/var/lib/mysql
      - ./database/ekspedisi.sql:/docker-entrypoint-initdb.d/ekspedisi.sql

    networks:
      - ekspedisi-network

  web:
    build: .

    env_file:
      - .env

    restart: always

    depends_on:
      - db

    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: ekspedisi

      JWT_SECRET: ${JWT_SECRET}

      MIDTRANS_SERVER_KEY: ${MIDTRANS_SERVER_KEY}
      MIDTRANS_CLIENT_KEY: ${MIDTRANS_CLIENT_KEY}
      MIDTRANS_IS_PRODUCTION: ${MIDTRANS_IS_PRODUCTION}

      EMAIL_USER: ${EMAIL_USER}
      EMAIL_PASS: ${EMAIL_PASS}

      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY}

      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}

      NODE_ENV: production

    expose:
      - '3000'

    networks:
      - ekspedisi-network

  nginx:
    image: nginx:latest

    container_name: nginx

    restart: always

    depends_on:
      - web

    ports:
      - '80:80'

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf

    networks:
      - ekspedisi-network

volumes:
  db_data:

networks:
  ekspedisi-network:
