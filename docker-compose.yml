version: "3.9"

services:

  web1:
    build: .
    container_name: web1
    restart: always
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ekspedisi
      DB_USERNAME: root
      DB_PASSWORD: password
    depends_on:
      - db

  web2:
    build: .
    container_name: web2
    restart: always
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ekspedisi
      DB_USERNAME: root
      DB_PASSWORD: password
    depends_on:
      - db

  web3:
    build: .
    container_name: web3
    restart: always
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ekspedisi
      DB_USERNAME: root
      DB_PASSWORD: password
    depends_on:
      - db

  nginx:
    image: nginx:latest
    container_name: loadbalancer
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - web1
      - web2
      - web3

  db:
    image: mariadb:11
    container_name: database
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: ekspedisi
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/ekspedisi.sql:/docker-entrypoint-initdb.d/ekspedisi.sql

volumes:
  db_data: